name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "a76a7221a87e2b10e50682f33164f7d4"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-harness-test"
database_id = "214b6b6c-b028-4b10-9fe0-e1b6ecf0c1cc"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[vars]
# リッチメニュー切り替え機能の環境変数
LINE_ADMIN_USER_ID = "YOUR_LINE_USER_ID_HERE"  # 管理者のLINE user_id（Uから始まる33文字）に置き換えてください
RICH_MENU_NEW = "richmenu-new-placeholder"      # 新規客用リッチメニューID（Task #1で取得後に更新）
RICH_MENU_EXISTING = "richmenu-existing-placeholder"  # 既存客用リッチメニューID（Task #1で取得後に更新）

[triggers]
crons = ["*/5 * * * *"]
